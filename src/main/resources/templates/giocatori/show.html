<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dettagli Giocatore</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div th:if="${giocatore}" style="text-align: center;">
        <h1><span th:text="${giocatore.nome}">Nome</span> <span th:text="${giocatore.cognome}">Cognome</span></h1>
        
        <div sec:authorize="hasRole('ADMIN')" style="margin-bottom: 20px;">
            <a th:href="@{'/giocatori/edit/' + ${giocatore.id}}" style="padding: 5px 10px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 3px; font-weight: bold;">✏️ Modifica Giocatore</a>
        </div>

        <div style="line-height: 1.8;">
            <div><strong>Ruolo:</strong> <span th:text="${giocatore.ruolo}">Attaccante</span></div>
            <div><strong>Data di Nascita:</strong> <span th:text="${giocatore.dataDiNascita}">01/01/1990</span></div>
            <div><strong>Altezza:</strong> <span th:text="${giocatore.altezza}">1.80</span> m</div>
            <div><strong>Numero Tessera:</strong> <span th:text="${giocatore.numeroTessera}">12345</span></div>
            <div th:if="${giocatore.squadra != null}"><strong>Squadra Attuale:</strong> <a th:href="@{'/squadre/' + ${giocatore.squadra.id}}" th:text="${giocatore.squadra.nome}">Nome</a></div>
        </div>
    </div>
    
    <div th:unless="${giocatore}">Giocatore non trovato!</div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
