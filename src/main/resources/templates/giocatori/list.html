<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Elenco Giocatori</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Tutti i Giocatori</h1>
	
	<div sec:authorize="hasRole('ADMIN')" style="text-align: center; margin-bottom: 20px;">
	    <a th:href="@{/giocatori/new}" style="padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
	        + Aggiungi Nuovo Giocatore
	    </a>
	</div>
    <div th:if="${giocatori.isEmpty()}">Non ci sono giocatori nel sistema</div>
    
	<ul style="list-style-type: none; padding: 0; max-width: 600px; margin: 0 auto;">
        <li th:each="giocatore : ${giocatori}" style="padding: 12px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">
            
            <div>
                <a th:href="@{'/giocatori/' + ${giocatore.id}}" th:text="${giocatore.nome + ' ' + giocatore.cognome}" style="font-weight: bold; text-decoration: none; font-size: 1.1em;">Nome Cognome</a>
                <span th:if="${giocatore.squadra != null}" th:text="' (' + ${giocatore.squadra.nome} + ')'" style="color: #666; font-size: 0.9em;">(Squadra)</span>
            </div>
            
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/giocatori/edit/' + ${giocatore.id}}" style="padding: 5px 10px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 3px; font-size: 0.9em; font-weight: bold; margin-right: 5px;">
                    ✏️ Modifica
                </a>
                <a th:href="@{'/giocatori/delete/' + ${giocatore.id}}" onclick="return confirm('Vuoi eliminare questo giocatore?');" style="padding: 5px 10px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 3px; font-size: 0.9em; font-weight: bold;">
                    🗑️ Elimina
                </a>
            </div>
            
        </li>
    </ul>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
