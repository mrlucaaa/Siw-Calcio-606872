<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Aggiungi Arbitro</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Aggiungi un nuovo Arbitro</h1>
    
    <form th:action="@{/arbitri}" method="POST" th:object="${arbitro}" style="width: 50%; margin: 0 auto; text-align: left;">
        
        <div style="margin-bottom: 15px;">
            <label>Nome:</label><br>
            <input required type="text" th:field="*{nome}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Cognome:</label><br>
            <input required type="text" th:field="*{cognome}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Codice Arbitrale:</label><br>
            <input required type="number" th:field="*{codiceArbitrale}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                Salva Arbitro
            </button>
        </div>
    </form>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
