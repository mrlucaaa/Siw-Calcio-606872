<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dettagli Arbitro</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div th:if="${arbitro}">
        <h1><span th:text="${arbitro.nome}">Nome</span> <span th:text="${arbitro.cognome}">Cognome</span></h1>
        <div>Codice Arbitrale: <span th:text="${arbitro.codiceArbitrale}">123456</span></div>
    </div>
    
    <div th:unless="${arbitro}">Arbitro non trovato!</div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
