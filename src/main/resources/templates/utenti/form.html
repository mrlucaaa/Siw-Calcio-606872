<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registra Utente</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Registra un nuovo Utente</h1>
    
	<form th:action="@{/utenti}" method="POST" th:object="${utente}" style="width: 50%; margin: 0 auto; text-align: left;">
	        
	        <input type="hidden" th:field="*{id}" />
	        
	        <div style="margin-bottom: 15px;">
	            <label>Username:</label><br>
	            <input required type="text" th:field="*{username}" style="width: 100%; padding: 8px;"/>
	        </div>
	        
	        <div style="margin-bottom: 15px;">
	            <label>Password:</label><br>
	            <input required type="password" th:field="*{password}" style="width: 100%; padding: 8px;"/>
	        </div>
	        
	        <div style="margin-bottom: 15px;">
	            <label>Ruolo:</label><br>
	            <select required th:field="*{ruolo}" style="width: 100%; padding: 8px;">
	                <option value="USER">Utente Standard</option>
	                <option value="ADMIN">Amministratore</option>
	            </select>
	        </div>
	        
	        <div style="text-align: center; margin-top: 20px;">
	            <button type="submit" style="padding: 10px 20px; background-color: black; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
	                Salva Utente
	            </button>
	        </div>
	    </form>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
