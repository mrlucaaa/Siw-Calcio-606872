<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profilo Utente</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div th:if="${utente}">
        <h1>Profilo di: <span th:text="${utente.username}">Username</span></h1>
        <div>Livello Ruolo: <span th:text="${utente.ruolo}">0</span></div>
    </div>
    
    <div th:unless="${utente}">Utente non trovato!</div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
