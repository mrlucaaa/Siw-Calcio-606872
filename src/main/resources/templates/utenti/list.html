<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Elenco Utenti</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Tutti gli Utenti</h1>
	
	<div sec:authorize="hasRole('ADMIN')" style="text-align: center; margin-bottom: 20px;">
	    <a th:href="@{/utenti/new}" style="padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
	        + Aggiungi Nuovo Utente
	    </a>
	</div>
    <div th:if="${utenti.isEmpty()}">Non ci sono utenti nel sistema</div>
    
    <ul style="list-style-type: none; padding: 0; max-width: 600px; margin: 0 auto;">
        <li th:each="utente : ${utenti}" style="padding: 12px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <a th:href="@{'/utenti/' + ${utente.id}}" th:text="${utente.username}" style="font-weight: bold; text-decoration: none; font-size: 1.1em;">Username</a>
            </div>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/utenti/edit/' + ${utente.id}}" style="padding: 5px 10px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 3px; font-size: 0.9em; font-weight: bold; margin-right: 5px;">
                    ✏️ Modifica
                </a>
                <a th:href="@{'/utenti/delete/' + ${utente.id}}" onclick="return confirm('Sei sicuro?');" style="padding: 5px 10px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 3px; font-size: 0.9em; font-weight: bold;">
                    🗑️ Elimina
                </a>
            </div>
        </li>
    </ul>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
