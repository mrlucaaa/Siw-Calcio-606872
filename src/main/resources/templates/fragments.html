<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="header-css">
    <link rel="stylesheet" th:href="@{/css/stile.css}" />
</head>

<body>

    <header th:fragment="header">
        <div style="background-color: whitesmoke; padding: 15px; border-bottom: 1px solid #ccc; margin-bottom: 20px; text-align: center; position: relative;">
            
            <div style="position: absolute; top: 15px; right: 20px; font-size: 1.1em;">
                
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" style="padding: 8px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">Accedi</a>
                </div>

                <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 15px;">
                    <span style="color: black;">
                        <strong sec:authentication="name" style="color: deepskyblue; text-transform: uppercase;">Utente</strong>
                    </span>

					<form th:action="@{/logout}" method="POST" style="display: inline;">
					    <button type="submit" class="btn-esci">Esci</button>
					</form>
                </div>
                
            </div>

            <div style="margin-bottom: 15px; margin-top: 20px;">
                <a th:href="@{/}">
                    <img th:src="@{/images/logo-siw.png}" alt="Logo SIW Calcio" style="max-height: 80px;" />
                </a>
            </div>
            
            <nav style="display: inline; font-size: 1.05em;">
                <a th:href="@{/partite}" style="text-decoration: none; color:black; margin: 0 5px;">Partite</a> | 
                <a th:href="@{/squadre}" style="text-decoration: none; color:black; margin: 0 5px;">Squadre</a> | 
                <a th:href="@{/giocatori}" style="text-decoration: none; color:black; margin: 0 5px;">Giocatori</a> | 
                <a th:href="@{/arbitri}" style="text-decoration: none; color:black; margin: 0 5px;">Arbitri</a> | 
                <a th:href="@{/tornei}" style="text-decoration: none; color:black; margin: 0 5px;">Tornei</a> | 
				<span sec:authorize="hasRole('ADMIN')">
				        <a th:href="@{/commenti}" style="text-decoration: none; color: black; margin: 0 5px;">Commenti</a> |
				    </span>
                <a th:href="@{/giocatori/ricerca}" style="color: green; font-weight: bold; margin-left: 5px; text-decoration: none;">Cerca Giocatori</a>
            </nav>
            
        </div>
    </header>

    <footer th:fragment="footer">
        <div style="margin-top: 40px; padding: 15px; border-top: 1px solid #ccc; text-align: center; font-size: 0.9em; color: #666; background-color: #f8f9fa;">
            <p>&copy; 2026 SIW Calcio - Progetto Università Roma Tre</p>
        </div>
    </footer>

</body>
</html>
