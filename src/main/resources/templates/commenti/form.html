<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lascia un Commento</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Lascia un nuovo Commento</h1>
    
    <form th:action="@{/commenti}" method="POST" th:object="${commento}" style="width: 50%; margin: 0 auto; text-align: left;">
        
        <div style="margin-bottom: 15px;">
            <label>Data e Ora del Commento:</label><br>
            <input required type="datetime-local" th:field="*{dataOra}" style="width: 100%; padding: 8pxPrefix;"/>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Autore del Commento:</label><br>
            <select required th:field="*{autore}" style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Seleziona il tuo profilo...</option>
                <option th:each="utente : ${utenti}" th:value="${utente.id}" th:text="${utente.username}"></option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Partita da Commentare:</label><br>
            <select required th:field="*{partitaRiferimento}" style="width: 100%; padding: 8px;">
                <option value="" disabled selected>Seleziona la partita...</option>
                <option th:each="p : ${partite}" th:value="${p.id}" th:text="${p.squadraCasa.nome + ' - ' + p.squadraTrasferta.nome}"></option>
            </select>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Testo del Messaggio:</label><br>
            <textarea required th:field="*{testo}" rows="4" placeholder="Scrivi qui il tuo commento..." style="width: 100%; padding: 8px; font-family: inherit;"></textarea>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                Invia Commento
            </button>
        </div>
    </form>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
