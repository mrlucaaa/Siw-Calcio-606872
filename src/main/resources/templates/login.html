<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Accedi - SIW Calcio</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div style="max-width: 400px; margin: 50px auto; padding: 20px; background-color: #f9f9f9; border-radius: 8px; border: 1px solid #ddd;">
        <h2 style="text-align: center; margin-bottom: 20px;">Accedi</h2>
        
        <div th:if="${param.error}" style="padding: 10px; margin-bottom: 15px; background-color: #f8d7da; color: #721c24; border-radius: 4px; border: 1px solid #f5c6cb;">
            Username o password non validi.
        </div>
        
        <div th:if="${param.logout}" style="padding: 10px; margin-bottom: 15px; background-color: #d4edda; color: #155724; border-radius: 4px; border: 1px solid #c3e6cb;">
            Sei stato disconnesso con successo.
        </div>
        
        <div th:if="${param.registered}" style="padding: 10px; margin-bottom: 15px; background-color: #cce5ff; color: #004085; border-radius: 4px; border: 1px solid #b8daff;">
            Registrazione completata con successo! Ora puoi accedere.
        </div>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 15px;">
                <label for="username" style="display: block; font-weight: bold; margin-bottom: 5px;">Username</label>
                <input type="text" id="username" name="username" required autofocus style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;" />
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="password" style="display: block; font-weight: bold; margin-bottom: 5px;">Password</label>
                <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;" />
            </div>
            
            <button type="submit" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1.1em;">
                Accedi
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
            <p style="margin: 0; color: #555;">Non hai un account?</p>
            <a th:href="@{/register}" style="display: inline-block; margin-top: 10px; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                Registrati
            </a>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
