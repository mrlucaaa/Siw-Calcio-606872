<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Elenco Squadre</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Tutte le Squadre</h1>
	
	<div sec:authorize="hasRole('ADMIN')" style="text-align: center; margin-bottom: 20px;">
	    <a th:href="@{/squadre/new}" style="padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
	        + Aggiungi Nuova Squadra
	    </a>
	</div>
    <div th:if="${squadre.isEmpty()}">Non ci sono squadre nel sistema</div>
    
	<ul style="list-style-type: none; padding: 0; max-width: 600px; margin: 0 auto;">
        <li th:each="squadra : ${squadre}" style="padding: 15px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">
            
            <a th:href="@{'/squadre/' + ${squadra.id}}" th:text="${squadra.nome}" style="font-size: 1.2em; font-weight: bold; text-decoration: none;">Nome Squadra</a>
            
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/squadre/edit/' + ${squadra.id}}" style="padding: 5px 10px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 3px; font-size: 0.9em; margin-right: 5px; font-weight: bold;">
                    ✏️ Modifica
                </a>
                
                <a th:href="@{'/squadre/delete/' + ${squadra.id}}" onclick="return confirm('Sei sicuro di voler eliminare questa squadra?');" style="padding: 5px 10px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 3px; font-size: 0.9em; font-weight: bold;">
                    🗑️ Elimina
                </a>
            </div>
            
        </li>
    </ul>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
