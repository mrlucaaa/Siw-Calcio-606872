<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dettagli Squadra</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div th:if="${squadra}" style="max-width: 800px; margin: 40px auto; text-align: center;">
        
        <h1 th:text="${squadra.nome}" style="color: black;">Nome Squadra</h1>

        <div style="font-size: 1.1em; color: #555;">
            <div style="margin-bottom: 8px;"><strong>Città:</strong> <span th:text="${squadra.città}">Roma</span></div>
            <div style="margin-bottom: 8px;"><strong>Anno di Fondazione:</strong> <span th:text="${squadra.annoDiFondazione}">1927</span></div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ccc; margin: 30px 0;">

        <div style="display: flex; gap: 40px; justify-content: center; text-align: left;">
            
            <div style="flex: 1; min-width: 300px; background-color: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
                <h2 style="margin-top: 0; text-align: center;">Rosa della Squadra</h2>
                
                <div th:if="${squadra.giocatori == null || squadra.giocatori.isEmpty()}" style="color: #666; font-style: italic; text-align: center;">
                    <p>Non ci sono ancora giocatori registrati in questa squadra.</p>
                </div>
                
                <ul th:unless="${squadra.giocatori == null || squadra.giocatori.isEmpty()}" style="padding: 0; list-style-type: none; line-height: 1.8;">
                    <li th:each="g : ${squadra.giocatori}" style="border-bottom: 1px solid #e0e0e0; padding: 5px 0;">
                        <strong th:text="${g.nome + ' ' + g.cognome}">Nome Cognome</strong> - 
                        <span th:text="${g.ruolo}" style="color: #666; font-size: 0.9em; float: right;">Ruolo</span>
                    </li>
                </ul>
           
                </div>
            </div>

        </div>
    </div>
    
    <div th:unless="${squadra}" style="text-align: center; margin-top: 20px; color: red; font-weight: bold;">
        Squadra non trovata!
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
