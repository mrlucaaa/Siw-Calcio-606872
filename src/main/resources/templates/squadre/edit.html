<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifica Squadra</title>
    <div th:replace="~{fragments :: header-css}"></div>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <h1>Modifica Squadra</h1>
    
    <form th:action="@{'/squadre/edit/' + ${squadra.id}}" method="POST" th:object="${squadra}" style="width: 50%; margin: 0 auto; text-align: left;">
		<input type="hidden" th:field="*{id}" />
		
		<div th:if="${#fields.hasGlobalErrors()}" style="color: #d9534f; background-color: #f9f2f2; border: 1px solid #d9534f; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
            <p style="margin: 0;" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Nome della Squadra:</label><br>
            <input required type="text" th:field="*{nome}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Città:</label><br>
            <input required type="text" th:field="*{città}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Anno di Fondazione:</label><br>
            <input required type="number" th:field="*{annoDiFondazione}" style="width: 100%; padding: 8px;"/>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" style="padding: 10px 20px; background-color: black; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                Salva Squadra
            </button>
        </div>
    </form>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
